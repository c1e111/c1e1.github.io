<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特殊文字屋さん</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="special-box">

  <h2>❤️ ハート</h2>

  <div class="special-grid">
    <button>♡</button>
    <button>♥</button>
    <button>❤</button>
    <button>❥</button>
    <button>❣</button>
    <button>💕</button>
    <button>💖</button>
    <button>💗</button>
  </div>

  <h2>⭐ 星</h2>

  <div class="special-grid">
    <button>★</button>
    <button>☆</button>
    <button>✦</button>
    <button>✧</button>
    <button>✩</button>
    <button>✪</button>
    <button>✫</button>
    <button>✬</button>
  </div>

  <h2>➡️ 矢印</h2>

  <div class="special-grid">
    <button>→</button>
    <button>←</button>
    <button>↑</button>
    <button>↓</button>
    <button>⇒</button>
    <button>⇐</button>
    <button>⇑</button>
    <button>⇓</button>
  </div>

  <h2>🎵 音符</h2>

  <div class="special-grid">
    <button>♪</button>
    <button>♫</button>
    <button>♬</button>
    <button>♩</button>
    <button>𝄞</button>
    <button>𝄢</button>
    <button>🎵</button>
    <button>🎶</button>
  </div>

</div>

<!-- コピー通知 -->
<div class="copy-toast">
コピーしました！
</div>

<link rel="manifest" href="manifest.json">
<script src="script.js"></script>

</body>

<script>
if("serviceWorker" in navigator){

  window.addEventListener("load",()=>{

    navigator.serviceWorker.register("./service-worker.js");

  });

}
</script>
</html>
